name: Build MAUI .NET 10

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # 🔥 .NET 10 PREVIEW
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      # 🔥 MAUI preview workload
      - run: dotnet workload install maui --include-previews

      - run: dotnet restore

      # Windows
      - run: dotnet publish -f net10.0-windows10.0.19041.0 -c Release -o ./artifacts/windows

      # Android
      - run: dotnet publish -f net10.0-android -c Release -o ./artifacts/android

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./artifacts