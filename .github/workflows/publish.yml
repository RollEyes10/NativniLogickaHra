name: MAUI .NET 10 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 .NET 10 Preview
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Install MAUI workload
        run: dotnet workload install maui --include-previews

      - name: Restore
        run: dotnet restore

      # 🏗 Windows Build
      - name: Publish Windows
        run: dotnet publish -f net10.0-windows10.0.19041.0 -c Release -o ./artifacts/windows /p:PublishSingleFile=true /p:WindowsPackageType=None
        
      # 📱 Android Build
      - name: Publish Android
        run: dotnet publish -f net10.0-android -c Release -o ./artifacts/android /p:AndroidPackageFormats=aab

      - name: Get exe path
        id: get_exe
        run: |
          $exe = Get-ChildItem -Path ./artifacts/windows -Filter *.exe | Select-Object -First 1
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Get aab path
        id: get_aab
        run: |
          $aab = Get-ChildItem -Path ./artifacts/android -Filter *.aab -Recurse | Select-Object -First 1
          echo "aab_path=$($aab.FullName)" >> $env:GITHUB_OUTPUT

      # 🚀 Create Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.get_exe.outputs.exe_path }}
            ${{ steps.get_aab.outputs.aab_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}