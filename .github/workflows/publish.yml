name: Build & Release MAUI .NET 10

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # 🔥 .NET 10 PREVIEW
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - run: dotnet workload install maui --include-previews
      - run: dotnet restore

      # Windows
      - run: dotnet publish -f net10.0-windows10.0.19041.0 -c Release -o ./artifacts/windows

      # Android
      - run: dotnet publish -f net10.0-android -c Release -o ./artifacts/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows/**
            ./artifacts/android/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}